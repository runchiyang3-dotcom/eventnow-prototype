<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="EventNow Organizer Registration - Multi-step form to register as an Australian event organizer, includes permit application process.">
  <title>EventNow - Become an Organiser</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    .organiser-hero {
      background: linear-gradient(135deg, #0d6efd 0%, #084298 100%);
      border-radius: 0.5rem;
    }
    .form-step {
      display: none;
    }
    .form-step.active {
      display: block;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step-indicator {
      width: 2rem;
      height: 2rem;
    }
    .verification-code {
      letter-spacing: 0.5rem;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar (Same as main page) -->
  <nav class="navbar navbar-expand-lg bg-light mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Flag_of_Australia_%28converted%29.svg" height="24" class="me-2" alt="AU Flag">
        EventNow
      </a>
      <div class="d-flex">
        <a href="index.html" class="btn btn-outline-secondary me-2">
          <i class="bi bi-arrow-left"></i> Events
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mb-5">
    <!-- Hero Section -->
    <div class="organiser-hero text-white p-5 mb-5">
      <div class="row align-items-center">
        <div class="col-md-8">
          <h1 class="display-5 fw-bold">Become an Event Organiser</h1>
          <p class="lead">Create and manage professional events across Australia with our platform</p>
        </div>
        <div class="col-md-4 text-center">
          <i class="bi bi-megaphone" style="font-size: 4rem;"></i>
        </div>
      </div>
    </div>

    <!-- Registration Steps -->
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <!-- Step Indicators -->
        <div class="d-flex justify-content-between mb-5">
          <div class="text-center">
            <div class="step-indicator bg-primary rounded-circle text-white d-flex align-items-center justify-content-center mx-auto mb-2">1</div>
            <small>Account Setup</small>
          </div>
          <div class="text-center">
            <div class="step-indicator bg-secondary rounded-circle text-white d-flex align-items-center justify-content-center mx-auto mb-2">2</div>
            <small>Required Permits & Licenses</small>
          </div>
          <div class="text-center">
            <div class="step-indicator bg-secondary rounded-circle text-white d-flex align-items-center justify-content-center mx-auto mb-2">3</div>
            <small>Verification</small>
          </div>
        </div>

        <!-- Step 1: Account Setup -->
        <div class="form-step active" id="step1">
          <h3 class="mb-4">Create Your Organiser Account</h3>
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" required>
              </div>
              <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" required>
              </div>
              <div class="col-12">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" required>
                <div class="form-text">We'll send a verification code to this address</div>
              </div>
              <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
              </div>
              <div class="col-md-6">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" required>
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="terms" required>
                  <label class="form-check-label" for="terms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                  </label>
                </div>
              </div>
            </div>
            <div class="d-flex justify-content-end mt-4">
              <button type="button" class="btn btn-primary" onclick="nextStep(1, 2)">Continue <i class="bi bi-arrow-right"></i></button>
            </div>
          </form>
        </div>

        <!-- Step 2: Organisation Details -->
        <div class="form-step" id="step2">
          <h3 class="mb-4">Your Organisation Details</h3>
          <form>
            <div class="row g-3">
              <div class="col-12">
                <label for="orgName" class="form-label">Organisation Name</label>
                <input type="text" class="form-control" id="orgName" required>
              </div>
              <div class="col-md-6">
                <label for="abn" class="form-label">ABN (Optional)</label>
                <input type="text" class="form-control" id="abn" placeholder="11 222 333 444">
              </div>
              <div class="col-md-6">
                <label for="orgType" class="form-label">Organisation Type</label>
                <select class="form-select" id="orgType">
                  <option selected disabled>Select type...</option>
                  <option>Business</option>
                  <option>Non-Profit</option>
                  <option>Community Group</option>
                  <option>Educational Institution</option>
                  <option>Government</option>
                  <option>Individual</option>
                </select>
              </div>
              <div class="col-12">
                <label for="address" class="form-label">Street Address</label>
                <input type="text" class="form-control" id="address" required>
              </div>
              <div class="col-md-4">
                <label for="suburb" class="form-label">Suburb</label>
                <input type="text" class="form-control" id="suburb" required>
              </div>
              <div class="col-md-4">
                <label for="state" class="form-label">State</label>
                <select class="form-select" id="state" required>
                  <option selected disabled>Select state...</option>
                  <option>NSW</option>
                  <option>VIC</option>
                  <option>QLD</option>
                  <option>WA</option>
                  <option>SA</option>
                  <option>TAS</option>
                  <option>ACT</option>
                  <option
