<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="EventNow Login Page - Unified login portal for organizers and participants, demo mode with no validation required.">
  <title>Login Demo | EventNow</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    .login-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 1rem 3rem rgba(0,0,0,.175);
      max-width: 400px;
      width: 100%;
    }
    .logo-area {
      background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
      border-radius: 1rem 1rem 0 0;
      padding: 2rem;
      text-align: center;
    }
    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0;
    }
    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
    .btn-login {
      background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
      border: none;
      padding: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo Area -->
      <div class="logo-area text-white">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Flag_of_Australia_%28converted%29.svg" 
             height="30" class="mb-2" alt="AU Flag">
        <h1 class="logo-text">EventNow</h1>
        <p class="mb-0">DEMO MODE - No validation</p>
      </div>

      <!-- Login Form -->
      <div class="p-4 p-md-5">
        <h3 class="mb-4 text-center">Demo Login</h3>
        
        <div class="alert alert-info mb-4">
          <i class="bi bi-info-circle me-2"></i>
          This is a demo. Any credentials will work.
        </div>

        <form action="organiser.html" method="get">
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" 
                     placeholder="Enter anything" required>
            </div>
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" 
                     placeholder="Enter anything" required>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary btn-login w-100 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
          <p class="mb-2">Links to registration pages:</p>
          <div class="d-grid gap-2">
            <a href="organiserReg.html" class="btn btn-outline-primary">
              <i class="bi bi-megaphone me-2"></i>Organiser Registration
            </a>
            <a href="particiReg.html" class="btn btn-outline-success">
              <i class="bi bi-ticket me-2"></i>Participant Registration
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
